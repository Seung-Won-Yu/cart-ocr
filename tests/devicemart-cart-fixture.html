<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CartOCR DeviceMart fixture</title>
</head>
<body>
    <table id="cart_table">
        <thead>
            <tr>
                <th>선택</th>
                <th>이미지</th>
                <th>주문상품</th>
                <th>수량</th>
                <th>상품금액</th>
                <th>적립</th>
                <th>납기</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="checkbox" checked></td>
                <td><img src="https://www.devicemart.co.kr/goods_img/test-driver.jpg" alt="H-Bridge Motor Driver"></td>
                <td><a href="/goods/view?no=1">[해외]H-Bridge Motor Driver 1A [COM-00315]</a></td>
                <td><button>-</button><span>10</span><button>+</button></td>
                <td>45,000원</td>
                <td>0원</td>
                <td>1주일</td>
            </tr>
            <tr>
                <td><input type="checkbox" checked></td>
                <td><img src="https://www.devicemart.co.kr/goods_img/test-brainco.jpg" alt="스마트 바이오닉 핸드"></td>
                <td><a href="/goods/view?no=2">[해외]스마트 바이오닉 핸드 BrainCo-H1 (Medium size)</a></td>
                <td><button>-</button><span>3</span><button>+</button></td>
                <td><del>33,000,000원</del><strong>19% 27,000,000원</strong></td>
                <td>0원</td>
                <td>2주일</td>
            </tr>
            <tr>
                <td><input type="checkbox" checked></td>
                <td><img src="https://www.devicemart.co.kr/goods_img/test-converter.jpg" alt="DC/DC 변환 컨버터"></td>
                <td><a href="/goods/view?no=3">전압 강화형 DC/DC 변환 컨버터 24V to 5V [SZH-BPM003]</a></td>
                <td><button>-</button><span>5</span><button>+</button></td>
                <td>42,500원</td>
                <td>0원</td>
                <td>3~4일</td>
            </tr>
            <tr>
                <td><input type="checkbox" checked></td>
                <td colspan="6">
                    <img src="https://www.devicemart.co.kr/goods_img/test-packed.jpg" alt="packed row">
                    <a href="/goods/view?no=4">테이블 병합형 테스트 상품 [COM-99999]</a>
                    <span class="qty">- 10 +</span>
                    <span class="price_area">상품금액 45,000원</span>
                    <span>적립 0원</span>
                    <span>납기 1주일</span>
                </td>
            </tr>
        </tbody>
    </table>

    <pre id="result">pending</pre>

    <script>
        window.chrome = {
            runtime: {
                lastError: null,
                onMessage: {
                    addListener() {}
                },
                sendMessage(request, callback) {
                    callback({ success: true, data: `image:${request.url}` });
                }
            }
        };
    </script>
    <script src="../extension/content.js"></script>
    <script>
        setTimeout(async () => {
            const result = await scrapeCurrentCart();
            const expected = [
                { quantity: 10, price: 4500, amount: 45000 },
                { quantity: 3, price: 9000000, amount: 27000000 },
                { quantity: 5, price: 8500, amount: 42500 },
                { quantity: 10, price: 4500, amount: 45000 }
            ];
            const pass = result.length === expected.length &&
                result.every((item, index) => item.quantity === expected[index].quantity &&
                    item.price === expected[index].price &&
                    item.amount === expected[index].amount &&
                    item.sourceMall === "devicemart" &&
                    item.priceKind === "line-total-derived" &&
                    item.sourceLineAmount === expected[index].amount) &&
                result.reduce((sum, item) => sum + item.amount, 0) === 27132500;

            const output = document.getElementById("result");
            output.dataset.pass = String(pass);
            output.textContent = JSON.stringify({ pass, result }, null, 2);
        }, 0);
    </script>
</body>
</html>
