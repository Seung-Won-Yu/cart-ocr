<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CartOCR DeviceMart fixture</title>
</head>
<body>
    <table id="cart_table">
        <thead>
            <tr>
                <th>선택</th>
                <th>이미지</th>
                <th>주문상품</th>
                <th>수량</th>
                <th>상품금액</th>
                <th>적립</th>
                <th>납기</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="checkbox" checked></td>
                <td><img src="https://www.devicemart.co.kr/goods_img/test-modem.jpg" alt="LTE-CatM1 내장형 모뎀"></td>
                <td><a href="/goods/view?no=1">LTE-CatM1 내장형 모뎀 CZ-ME310G1</a></td>
                <td><input id="goodsCnt1" name="goodsCnt[]" value="5"></td>
                <td>420,000원</td>
                <td>0원</td>
                <td>3~4일</td>
            </tr>
            <tr>
                <td><input type="checkbox" checked></td>
                <td><img src="https://www.devicemart.co.kr/goods_img/test-mux.jpg" alt="16 Channel Multiplexer"></td>
                <td><a href="/goods/view?no=2">[해외]16 Channel Multiplexer [COM-00299]</a></td>
                <td><input id="goodsCnt2" name="goodsCnt[]" value="9"></td>
                <td>18,000원</td>
                <td>0원</td>
                <td>1주일</td>
            </tr>
            <tr>
                <td><input type="checkbox" checked></td>
                <td><img src="https://www.devicemart.co.kr/goods_img/test-servo.jpg" alt="TowerPro 호환 서보모터"></td>
                <td><a href="/goods/view?no=3">TowerPro 호환 서보모터 MG996R</a></td>
                <td><input id="goodsCnt3" name="goodsCnt[]" value="7"></td>
                <td>45,500원</td>
                <td>0원</td>
                <td>2~3일</td>
            </tr>
        </tbody>
    </table>

    <pre id="result">pending</pre>

    <script>
        window.chrome = {
            runtime: {
                lastError: null,
                onMessage: {
                    addListener() {}
                },
                sendMessage(request, callback) {
                    callback({ success: true, data: `image:${request.url}` });
                }
            }
        };
    </script>
    <script src="../extension/content.js"></script>
    <script>
        setTimeout(async () => {
            const result = await scrapeCurrentCart();
            const expected = [
                { quantity: 5, price: 84000, amount: 420000 },
                { quantity: 9, price: 2000, amount: 18000 },
                { quantity: 7, price: 6500, amount: 45500 }
            ];
            const pass = result.length === expected.length &&
                result.every((item, index) => item.quantity === expected[index].quantity &&
                    item.price === expected[index].price &&
                    item.amount === expected[index].amount) &&
                result.reduce((sum, item) => sum + item.amount, 0) === 483500;

            const output = document.getElementById("result");
            output.dataset.pass = String(pass);
            output.textContent = JSON.stringify({ pass, result }, null, 2);
        }, 0);
    </script>
</body>
</html>
