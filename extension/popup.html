<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CartOCR Scraper</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            width: 320px;
            margin: 0;
            padding: 16px;
            background-color: var(--bg-color);
            color: var(--text-primary);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .logo-icon {
            font-size: 24px;
            color: var(--primary);
            font-weight: bold;
        }

        .logo-text {
            font-size: 16px;
            font-weight: 700;
            margin: 0;
        }

        .version-badge {
            margin-left: auto;
            padding: 2px 6px;
            border-radius: 999px;
            background-color: #eef2ff;
            color: var(--primary);
            font-size: 11px;
            font-weight: 700;
        }

        .status-box {
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            line-height: 1.5;
        }

        .status-title {
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-icon {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #94a3b8;
        }

        .status-active .status-icon {
            background-color: var(--success);
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 10px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 8px;
        }

        .btn:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        .btn:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: #f1f5f9;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover:not(:disabled) {
            background-color: #e2e8f0;
        }

        .info-text {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="logo-icon">🛒</span>
        <h3 class="logo-text">CartOCR Scraper</h3>
        <span class="version-badge">v1.15</span>
    </div>

    <div class="status-box" id="status-container">
        <div class="status-title" id="status-title">
            <span class="status-icon" id="status-dot"></span>
            <span id="status-label">감지 중...</span>
        </div>
        <div id="status-desc" style="color: var(--text-secondary);">현재 페이지 주소를 확인하고 있습니다.</div>
    </div>

    <button id="scrape-btn" class="btn" disabled>장바구니 상품 수집</button>
    <button id="send-btn" class="btn btn-secondary" disabled>CartOCR 앱으로 전송/반영</button>

    <div class="info-text">
        쿠팡, 디바이스마트, 엘레파츠 장바구니 페이지를 지원합니다.
    </div>

    <script src="popup.js"></script>
</body>
</html>
